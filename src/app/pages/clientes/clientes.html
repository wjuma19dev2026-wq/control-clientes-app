<div class="row">
  <div class="col-12">
    <app-jumbotron />
    <app-breadcrumb />
  </div>
  <div class="col-6">
    <div class="card mb-3 bg-dark text-light">
      <div class="card-body d-flex align-items-center gap-3">
        <i style="font-size: 30px" class="typcn typcn-user-add-outline"></i>
        <div style="text-align: center">
          Clientes
          <strong class="d-block">{{ totalClientes() }}</strong>
        </div>
      </div>
    </div>
  </div>
  <div class="col-6">
    <div class="card mb-3 bg-info">
      <div class="card-body d-flex align-items-center gap-3">
        <i style="font-size: 30px" class="typcn typcn-chart-pie-outline"></i>
        <div style="text-align: center">
          Saldo
          <strong class="d-block">{{ saldoTotal() }}</strong>
        </div>
      </div>
    </div>
  </div>
</div>

<app-cliente-table />

<button (click)="agregarCliente()" class="btn mt-3 btn-indigo btn-with-icon btn-block">
  <i class="typcn typcn-plus"></i> Agregar cliente
</button>
