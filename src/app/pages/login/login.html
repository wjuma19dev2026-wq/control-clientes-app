<div class="az-signin-wrapper">
  <div class="az-card-signin" style="height: auto">
    <h1 class="az-logo text-capitalize">Control clientes</h1>
    <div class="az-signin-header">
      <h2>Bienvenido de nuevo!</h2>
      <h4>Inicia sesión para continuar</h4>

      <form action="index.html">
        <div class="form-group">
          <label>Email</label>
          <input
            type="text"
            class="form-control"
            placeholder="Enter your email"
            value="demo@bootstrapdash.com"
          />
        </div>
        <!-- form-group -->
        <div class="form-group">
          <label>Password</label>
          <input
            type="password"
            class="form-control"
            placeholder="Enter your password"
            value="thisisademo"
          />
        </div>
        <!-- form-group -->
        <button class="btn btn-az-primary btn-block">Sign In</button>
      </form>
    </div>

    <div class="az-signin-footer mt-4">
      <p><a href="">Olvidaste la contraseña?</a></p>
      <p>No tienes cuenta? <a routerLink="/register">Crear una cuenta</a></p>
    </div>
  </div>
  <!-- az-card-signin -->
</div>
